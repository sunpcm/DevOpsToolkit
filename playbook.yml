---
# Deprecated compatibility entrypoint. Prefer: bin/ubuntu-bootstrap.
- name: Map the legacy servers group to the unified inventory group
  hosts: servers
  gather_facts: false
  tasks:
    - name: Register the host in ubuntu_servers
      ansible.builtin.add_host:
        name: "{{ inventory_hostname }}"
        groups: ubuntu_servers
        ansible_host: "{{ ansible_host | default(inventory_hostname) }}"
        ansible_user: "{{ ansible_user | default('root') }}"
        ansible_port: "{{ ansible_port | default(22) }}"

- import_playbook: ansible/playbooks/ubuntu-bootstrap.yml
  vars:
    target_user: "{{ ansible_new_user }}"
