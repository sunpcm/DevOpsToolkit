---
- name: Map the host architecture for Docker packages
  ansible.builtin.set_fact:
    docker_deb_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_architecture] | default(ansible_architecture) }}"

- name: Install Docker repository prerequisites
  become: true
  ansible.builtin.apt:
    name:
      - ca-certificates
    state: present
    update_cache: true
    cache_valid_time: "{{ apt_cache_valid_time }}"

- name: Create the APT keyring directory
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Download the Docker repository signing key
  become: true
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    owner: root
    group: root
    mode: "0644"
  register: docker_repository_key

- name: Configure the Docker deb822 source
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
    content: |
      Types: deb
      URIs: https://download.docker.com/linux/ubuntu
      Suites: {{ ansible_distribution_release }}
      Components: stable
      Architectures: {{ docker_deb_arch }}
      Signed-By: /etc/apt/keyrings/docker.asc
  register: docker_repository

- name: Install Docker Engine and Compose
  become: true
  ansible.builtin.apt:
    name:
      - containerd.io
      - docker-buildx-plugin
      - docker-ce
      - docker-ce-cli
      - docker-compose-plugin
    state: present
    update_cache: "{{ docker_repository_key.changed or docker_repository.changed }}"

- name: Enable Docker
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Grant the target account Docker access
  become: true
  ansible.builtin.user:
    name: "{{ target_user }}"
    groups: docker
    append: true
