---
- name: Install UFW
  become: true
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow declared inbound ports before enabling the firewall
  become: true
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment | default(omit) }}"
  loop: "{{ firewall_allowed_ports }}"

- name: Apply default firewall policies
  become: true
  community.general.ufw:
    state: enabled
    direction: incoming
    policy: deny

- name: Allow outbound traffic by default
  become: true
  community.general.ufw:
    direction: outgoing
    policy: allow
