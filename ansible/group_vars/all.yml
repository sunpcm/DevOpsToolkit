---
# Required by wsl-bootstrap and ubuntu-bootstrap. user-only defaults to the
# authenticated account and rejects a different value.
target_user: ""
target_password_hash: ""
target_authorized_keys: []
target_passwordless_sudo: false

# User profile
configure_shell: true
configure_git: true
configure_uv: true
configure_node: true
configure_go: true
configure_homebrew_environment: true
configure_wsl_integration: true
enable_wsl_docker_integration: true

git_user_name: ""
git_user_email: ""
git_editor: nvim
git_default_branch: main
git_pull_rebase: "false"

nvm_version: bab86d5de571015b63fd8fc30b47bbe072a1290e
node_version: "24.11.1"
go_version: "1.22.1"
uv_version: "0.9.18"
uv_install_url: "https://astral.sh/uv/{{ uv_version }}/install.sh"
goenv_version: "3.1.4"

# Immutable revisions keep repeated runs reproducible. Update them deliberately.
ohmyzsh_version: c954bbb168fc645592c50017de0d0e138db8df5f
zsh_theme: agnoster
zsh_plugins:
  - git
  - zsh-autosuggestions
  - zsh-syntax-highlighting
zsh_plugin_sources:
  zsh-autosuggestions:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    version: 0e810e5afa27acbd074398eefbe28d13005dbc15
  zsh-syntax-highlighting:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    version: 5eb677bb0fa9a3e60f0eff031dc13926e093df92

# System profile
system_timezone: Asia/Shanghai
system_locale: en_US.UTF-8
apt_cache_valid_time: 3600
system_packages:
  - build-essential
  - ca-certificates
  - curl
  - git
  - locales
  - sudo
  - unzip
  - zsh

install_linuxbrew: true
linuxbrew_version: 686144996e76cda071d5829d1c180704dd271fc3
linuxbrew_packages:
  - bat
  - btop
  - dust
  - eza
  - fd
  - fzf
  - gh
  - git
  - goenv
  - httpie
  - jq
  - lazydocker
  - lazygit
  - neovim
  - procs
  - ripgrep
  - starship
  - tldr
  - yq

install_docker: false
install_nginx: false
enable_firewall: true
firewall_allowed_ports:
  - { port: "{{ ssh_port }}", proto: tcp, comment: SSH }

# SSH changes are deliberately conservative by default.
configure_ssh: true
ssh_port: 22
disable_root_login: false
disable_password_auth: false

# user-only is strict unless this explicit exception is enabled.
user_only_allow_system_dependencies: false
