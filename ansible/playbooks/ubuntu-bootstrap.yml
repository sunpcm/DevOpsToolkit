---
- name: Bootstrap Ubuntu server from root
  hosts: ubuntu_servers
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Require a root SSH session and an explicit target account
      ansible.builtin.assert:
        that:
          - ansible_user_id == 'root'
          - target_user | length > 0
          - target_user != 'root'
          - target_user is match('^[a-z_][a-z0-9_-]*[$]?$')
        fail_msg: "ubuntu-bootstrap requires ansible_user=root and -e target_user=<user>."

  roles:
    - role: system_base
      vars:
        system_context: ubuntu
    - role: account_create
    - role: firewall
      when: enable_firewall | bool
    - role: ssh_security
      when: configure_ssh | bool
    - role: docker
      when: install_docker | bool
    - role: nginx
      when: install_nginx | bool
    - role: linuxbrew
      when: install_linuxbrew | bool
    - role: root_profile
    - role: user_profile
      vars:
        profile_use_become: true
        profile_target_user: "{{ target_user }}"
        profile_target_home: "{{ target_account_home }}"
