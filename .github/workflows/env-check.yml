name: Validate

on:
  push:
    paths:
      - "ansible/**"
      - "bin/**"
      - "scripts/**"
      - "tests/**"
      - "install.sh"
      - ".github/workflows/**"
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - python: "3.10"
            ansible_core: "2.12.10"
          - python: "3.12"
            ansible_core: "2.18.6"
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python }}

      - name: Install validation dependencies
        run: |
          python -m pip install ansible-core==${{ matrix.ansible_core }}
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Validate
        run: ./tests/verify-ansible.sh
