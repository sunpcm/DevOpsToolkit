name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install ansible-core==2.18.6
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Validate source
        run: ./tests/verify-ansible.sh

      - name: Build fixed-name assets
        run: ./scripts/build-release.sh "${GITHUB_REF_NAME}" dist

      - name: Verify packaged version
        run: |
          mkdir packaged
          tar -xzf dist/devops-toolkit.tar.gz -C packaged
          test "$(cat packaged/devops-toolkit/VERSION)" = "${GITHUB_REF_NAME}"
          (cd dist && sha256sum --check devops-toolkit.tar.gz.sha256)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/devops-toolkit.tar.gz \
            dist/devops-toolkit.tar.gz.sha256 \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
