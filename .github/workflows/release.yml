name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout tag
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install ansible-core==2.18.6
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Validate source
        run: ./tests/verify-ansible.sh

  release:
    needs: validate
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      contents: write
      id-token: write
    env:
      COSIGN_VERSION: v3.1.1
      COSIGN_LINUX_AMD64_SHA256: ae1ecd212663f3693ad9edf8b1a183900c9a52d3155ba6e354237f9a0f6463fc
    steps:
      - name: Checkout validated tag on a fresh runner
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Confirm clean source
        run: test -z "$(git status --porcelain)"

      - name: Build fixed-name assets
        run: ./scripts/build-release.sh "${GITHUB_REF_NAME}" dist

      - name: Install pinned Cosign
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "${RUNNER_TEMP}/cosign"
          gh release download "${COSIGN_VERSION}" \
            --repo sigstore/cosign \
            --pattern cosign-linux-amd64 \
            --dir "${RUNNER_TEMP}/cosign"
          echo "${COSIGN_LINUX_AMD64_SHA256}  ${RUNNER_TEMP}/cosign/cosign-linux-amd64" | sha256sum --check --strict
          chmod 0755 "${RUNNER_TEMP}/cosign/cosign-linux-amd64"
          echo "${RUNNER_TEMP}/cosign" >>"${GITHUB_PATH}"
          mv "${RUNNER_TEMP}/cosign/cosign-linux-amd64" "${RUNNER_TEMP}/cosign/cosign"

      - name: Sign archive with GitHub OIDC
        run: |
          cosign sign-blob \
            --yes \
            --bundle dist/devops-toolkit.tar.gz.sigstore.json \
            dist/devops-toolkit.tar.gz

      - name: Verify Sigstore identity
        run: |
          cosign verify-blob \
            --bundle dist/devops-toolkit.tar.gz.sigstore.json \
            --certificate-identity "https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            --certificate-github-workflow-repository "${GITHUB_REPOSITORY}" \
            --certificate-github-workflow-ref "${GITHUB_REF}" \
            --certificate-github-workflow-trigger push \
            dist/devops-toolkit.tar.gz

      - name: Verify packaged version
        run: |
          mkdir packaged
          tar -xzf dist/devops-toolkit.tar.gz -C packaged
          test "$(cat packaged/devops-toolkit/VERSION)" = "${GITHUB_REF_NAME}"
          (cd dist && sha256sum --check devops-toolkit.tar.gz.sha256)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/devops-toolkit.tar.gz \
            dist/devops-toolkit.tar.gz.sha256 \
            dist/devops-toolkit.tar.gz.sigstore.json \
            --verify-tag \
            --generate-notes \
            --title "${GITHUB_REF_NAME}"
